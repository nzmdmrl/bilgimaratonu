version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: bilgimaratonu_db
    environment:
      POSTGRES_USER: bilgimaratonu
      POSTGRES_PASSWORD: bilgimaratonu123
      POSTGRES_DB: bilgimaratonu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: bilgimaratonu_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  postgres_data:
